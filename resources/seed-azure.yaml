apiVersion: core.gardener.cloud/v1beta1
kind: Seed
metadata:
  name: azure
spec:
  provider:
    type: azure
    region: westeurope
    zones:
    - "1"
    - "2"
    - "3"
  dns:
    provider:
      type: azure-dns
      secretRef:
        name: ingress-secret
        namespace: garden
  networks:
    ipFamilies:
    - IPv4
    nodes: 10.240.0.0/16
    pods: 10.241.128.0/17
    services: 10.241.0.0/17
    shootDefaults:
      pods: 100.64.0.0/12
      services: 100.104.0.0/13
  ingress:
    controller:
      kind: nginx
    domain: ingress.azure.seed.fake.example.com
  settings:
    scheduling:
      visible: true
